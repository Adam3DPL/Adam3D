<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkipIT</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial, sans-serif;
  color: white;
}

.header {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: black;
  z-index: 10;
}

.logo {
  font-weight: bold;
}

.upload {
  position: fixed;
  top: 50px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 10px;
  background: black;
  padding: 10px;
  z-index: 10;
}

input {
  padding: 10px;
  width: 60%;
  border-radius: 20px;
  border: none;
}

button {
  padding: 10px 15px;
  border-radius: 20px;
  border: none;
  background: red;
  color: white;
  cursor: pointer;
}

.feed {
  margin-top: 120px;
}

.video-card {
  position: relative;
  height: 100vh;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.right-panel {
  position: absolute;
  right: 10px;
  bottom: 80px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  align-items: center;
}

.icon {
  text-align: center;
  font-size: 18px;
}

.bottom-bar {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 10px;
  background: linear-gradient(transparent, black);
}

.title {
  font-weight: bold;
}

</style>
</head>
<body>

<div class="header">
  <div class="logo">SkipIT</div>
  <div>🔍</div>
</div>

<div class="upload">
  <input id="url" placeholder="Paste video URL">
  <button onclick="addVideo()">Post</button>
</div>

<div class="feed" id="feed"></div>

<script>
let videos = [];

function addVideo() {
  const url = document.getElementById("url").value.trim();

  if (!url) {
    alert("Paste a video link");
    return;
  }

  videos.unshift({ id: Date.now(), url, likes: 0 });
  document.getElementById("url").value = "";
  render();
}

function likeVideo(id) {
  videos = videos.map(v => {
    if (v.id === id) v.likes++;
    return v;
  });
  render();
}

function render() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  videos.forEach(video => {
    const div = document.createElement("div");
    div.className = "video-card";

    div.innerHTML = `
      <video src="${video.url}" autoplay loop muted playsinline></video>

      <div class="right-panel">
        <div class="icon" onclick="likeVideo(${video.id})">👍<br>${video.likes}</div>
        <div class="icon">💬</div>
        <div class="icon">↗️</div>
      </div>

      <div class="bottom-bar">
        <div class="title">@user • Cool video</div>
      </div>
    `;

    feed.appendChild(div);
  });
}
</script>

</body>
</html>
